# Render deployment configuration
services:
  - type: web
    name: videochat
    runtime: python
    pythonVersion: 3.14
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT videochat.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "yourdomain.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: videochat
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: videochat-redis
          type: redis
          property: connectionString

databases:
  - name: videochat
    databaseName: videochat
    user: videochat

redis:
  - name: videochat-redis
